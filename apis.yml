apis:
  - aid: culture-amp:culture-amp-public-api
    name: Culture Amp Public API
    type: RESTful
    description: >
      The Culture Amp Public API provides read-only programmatic access to
      employee data, performance cycles, manager reviews, and survey data.
      It follows OAuth 2.0 Client Credentials Flow authentication and returns
      paginated JSON responses. The API enables integration with HRIS systems,
      custom dashboards, and automated data pipelines.
