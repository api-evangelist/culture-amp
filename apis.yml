description: >
  Culture Amp is the leading employee experience platform providing tools for
  employee engagement surveys, performance management, and people analytics.
  The Culture Amp Public API is a RESTful, read-only interface that enables
  organizations to programmatically retrieve their people data—including
  employee records, demographics, performance cycles, manager reviews, and
  survey results—for use in external systems and custom analytics. The API
  uses OAuth 2.0 Client Credentials Flow for authentication and is available
  to all Culture Amp subscribers at no additional cost as part of standard
  subscription fees. The platform serves thousands of organizations worldwide
  and integrates with leading HRIS systems, Slack, Microsoft Teams, and
  compensation tools like Pave.
