"""
Culture Amp GraphQL API Schema
Conceptual schema derived from Culture Amp REST API covering employee surveys,
engagement scores, performance reviews, goal tracking, 1-on-1 meetings,
action plans, and workforce analytics for HR teams.
"""

schema {
  query: Query
  mutation: Mutation
}

# ─── Root Types ───────────────────────────────────────────────────────────────

type Query {
  # Employee queries
  employee(id: ID!): Employee
  employees(filter: EmployeeFilter, pagination: PaginationInput): EmployeeConnection

  # Survey queries
  survey(id: ID!): Survey
  surveys(filter: SurveyFilter, pagination: PaginationInput): SurveyConnection
  surveyResponse(id: ID!): SurveyResponse
  surveyResponses(surveyId: ID!, pagination: PaginationInput): SurveyResponseConnection

  # Engagement queries
  engagementScore(surveyId: ID!, groupId: ID): EngagementScore
  engagementScores(filter: EngagementScoreFilter): [EngagementScore!]!
  engagementBenchmark(industry: String, size: OrganizationSize): EngagementBenchmark

  # Performance queries
  performanceCycle(id: ID!): PerformanceCycle
  performanceCycles(filter: PerformanceCycleFilter, pagination: PaginationInput): PerformanceCycleConnection
  performanceReview(id: ID!): PerformanceReview
  performanceReviews(cycleId: ID!, pagination: PaginationInput): PerformanceReviewConnection

  # Goal queries
  goal(id: ID!): Goal
  goals(filter: GoalFilter, pagination: PaginationInput): GoalConnection

  # 1-on-1 queries
  oneOnOne(id: ID!): OneOnOne
  oneOnOnes(filter: OneOnOneFilter, pagination: PaginationInput): OneOnOneConnection

  # Action plan queries
  actionPlan(id: ID!): ActionPlan
  actionPlans(filter: ActionPlanFilter, pagination: PaginationInput): ActionPlanConnection

  # Department/Group queries
  department(id: ID!): Department
  departments(pagination: PaginationInput): DepartmentConnection
  group(id: ID!): Group
  groups(filter: GroupFilter, pagination: PaginationInput): GroupConnection

  # Analytics queries
  workforceAnalytics(filter: AnalyticsFilter): WorkforceAnalytics
  turnoverAnalytics(filter: TurnoverFilter): TurnoverAnalytics
  diversityReport(filter: DiversityFilter): DiversityReport

  # Manager queries
  managerReview(id: ID!): ManagerReview
  managerReviews(cycleId: ID!, pagination: PaginationInput): ManagerReviewConnection

  # Competency queries
  competency(id: ID!): Competency
  competencies(pagination: PaginationInput): CompetencyConnection

  # Feedback queries
  feedbackRequest(id: ID!): FeedbackRequest
  feedbackRequests(filter: FeedbackFilter, pagination: PaginationInput): FeedbackRequestConnection

  # Organization
  organization: Organization
  currentUser: User
}

type Mutation {
  # Goal mutations
  createGoal(input: CreateGoalInput!): GoalPayload!
  updateGoal(id: ID!, input: UpdateGoalInput!): GoalPayload!
  deleteGoal(id: ID!): DeletePayload!
  updateGoalProgress(id: ID!, progress: Float!): GoalPayload!

  # 1-on-1 mutations
  createOneOnOne(input: CreateOneOnOneInput!): OneOnOnePayload!
  updateOneOnOne(id: ID!, input: UpdateOneOnOneInput!): OneOnOnePayload!
  addOneOnOneAgendaItem(oneOnOneId: ID!, input: AgendaItemInput!): AgendaItemPayload!
  completeOneOnOneAgendaItem(id: ID!): AgendaItemPayload!

  # Action plan mutations
  createActionPlan(input: CreateActionPlanInput!): ActionPlanPayload!
  updateActionPlan(id: ID!, input: UpdateActionPlanInput!): ActionPlanPayload!
  createActionItem(planId: ID!, input: CreateActionItemInput!): ActionItemPayload!
  updateActionItem(id: ID!, input: UpdateActionItemInput!): ActionItemPayload!
  completeActionItem(id: ID!): ActionItemPayload!

  # Feedback mutations
  requestFeedback(input: FeedbackRequestInput!): FeedbackRequestPayload!
  submitFeedback(requestId: ID!, input: FeedbackSubmissionInput!): FeedbackPayload!

  # Performance mutations
  submitSelfReview(cycleId: ID!, input: SelfReviewInput!): PerformanceReviewPayload!
  submitPeerReview(revieweeId: ID!, cycleId: ID!, input: PeerReviewInput!): PeerReviewPayload!
}

# ─── Employee Types ───────────────────────────────────────────────────────────

type Employee {
  id: ID!
  externalId: String
  email: String!
  firstName: String!
  lastName: String!
  fullName: String!
  status: EmployeeStatus!
  jobTitle: String
  department: Department
  manager: Employee
  directReports: [Employee!]!
  location: Location
  startDate: Date
  endDate: Date
  gender: String
  ethnicity: String
  ageRange: String
  employmentType: EmploymentType
  demographics: Demographics
  surveys: [SurveyParticipation!]!
  goals(filter: GoalFilter): [Goal!]!
  performanceReviews: [PerformanceReview!]!
  oneOnOnes: [OneOnOne!]!
  actionPlans: [ActionPlan!]!
  engagementHistory: [EngagementDataPoint!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type EmployeeConnection {
  nodes: [Employee!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type Demographics {
  gender: String
  ethnicity: String
  ageRange: String
  yearsOfService: Float
