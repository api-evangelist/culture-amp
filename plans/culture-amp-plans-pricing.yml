spec: API Commons Plans 0.1
provider: Culture Amp
providerId: culture-amp
created: 2026-06-12
modified: 2026-06-12
reconciled: true
description: >
  Culture Amp does not publish list prices publicly. All pricing is
  quote-based and varies by module selection, employee count, contract term,
  and add-ons. API access is bundled into standard subscription fees with no
  additional charge. There is no free tier or freemium offering.
plans:
  - name: Engage
    description: >
      Employee engagement surveys and insights. Includes survey design,
      benchmarking, and reporting for HR teams.
    type: paid
    pricing:
      model: per-employee-per-month
      currency: USD
      range:
        min: 9
        max: 14
      billingCycle: annual
      note: Quote-based; price varies by employee count and contract term
    features:
      - type: boolean
        name: API Access
        value: true
        note: Included at no additional charge
      - type: boolean
        name: Employee Engagement Surveys
        value: true
      - type: boolean
        name: Benchmarking
        value: true
      - type: boolean
        name: Reporting
        value: true
      - type: boolean
        name: Performance Management
        value: false
      - type: boolean
        name: Development Tools
        value: false

